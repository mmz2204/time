<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Epoch & Unix Timestamp Converter - Convert Timestamp to Date Online</title>
    <meta name="keywords" content="timestamp converter, unix timestamp, epoch converter, timestamp to date, date to timestamp, current epoch time, online time converter">
    <meta name="description" content="Free and fast online Unix timestamp converter. Convert epoch timestamps to human-readable dates and vice versa. Supports both seconds and milliseconds with real-time updates.">
    <meta name="author" content="Timestamp Tool">
    <meta name="robots" content="index, follow">
    
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://tools.jianbox.cn/">
    <meta property="og:title" content="Epoch & Unix Timestamp Converter - Free Online Tool">
    <meta property="og:description" content="Convert Unix timestamps to readable dates and vice versa instantly. Real-time local time tracking in seconds and milliseconds.">
    <meta property="og:image" content="https://tools.jianbox.cn/og-image.png">

    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:title" content="Epoch & Unix Timestamp Converter">
    <meta property="twitter:description" content="Convert Unix timestamps to readable dates instantly. Supports seconds and milliseconds.">

    <link rel="icon" href="favicon.ico" type="image/x-icon">
    
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --success: #10b981;
            --success-hover: #059669;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --body-bg: #f8fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body {
            background: var(--body-bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        /* Header / Real-time Display */
        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
        }

        .title-area h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #4f46e5, #9333ea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }

        .title-area p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .live-clock-card {
            background: #f1f5f9;
            padding: 16px 24px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 280px;
        }

        .live-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            font-weight: 700;
        }

        .live-time {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-main);
        }

        .live-ts {
            font-size: 14px;
            font-family: monospace;
            color: var(--primary);
            font-weight: 600;
        }

        /* Unit Switcher */
        .unit-toggle-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
            background: #f1f5f9;
            padding: 6px;
            border-radius: 12px;
            width: fit-content;
        }

        .toggle-btn {
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: transparent;
            color: var(--text-muted);
        }

        .toggle-btn.active {
            background: var(--card-bg);
            color: var(--primary);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        /* Converter Grid */
        .convert-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 32px;
            margin-bottom: 40px;
        }

        .convert-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 30px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .convert-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 20px -3px rgba(0, 0, 0, 0.04);
        }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-muted);
        }

        .input-control {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 16px;
            color: var(--text-main);
            background: #f8fafc;
            transition: all 0.2s ease;
        }

        .input-control:focus {
            outline: none;
            border-color: var(--primary);
            background: var(--card-bg);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-secondary {
            background: #f1f5f9;
            color: var(--text-main);
        }

        .btn-secondary:hover {
            background: #e2e8f0;
        }

        /* Result Area */
        .result-box {
            padding: 16px;
            background: #f8fafc;
            border: 1px dashed var(--border-color);
            border-radius: 12px;
            min-height: 56px;
            display: flex;
            align-items: center;
            font-family: monospace;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
            word-break: break-all;
            cursor: pointer;
            position: relative;
        }

        .result-box:hover::after {
            content: 'Click to copy';
            position: absolute;
            right: 12px;
            font-family: system-ui;
            font-size: 11px;
            color: var(--primary);
            background: rgba(79, 70, 229, 0.08);
            padding: 4px 8px;
            border-radius: 6px;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #0f172a;
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .convert-grid {
                grid-template-columns: 1fr;
                gap: 24px;
            }
            .header-section {
                flex-direction: column;
                align-items: flex-start;
            }
            .live-clock-card {
                width: 100%;
            }
            .container {
                padding: 24px;
            }
        }

        /* Sponsor/Ad Section */
        .ad-placeholder {
            width: 100%;
            margin-top: 20px;
            padding: 20px;
            background: #f8fafc;
            border: 1px dashed var(--border-color);
            border-radius: 16px;
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="header-section">
            <div class="title-area">
                <h1>Epoch Converter</h1>
                <p>Universal Unix timestamp conversion tool</p>
            </div>
            <div class="live-clock-card">
                <span class="live-label">● Live Local Time</span>
                <span class="live-time" id="realTime">Loading...</span>
                <span class="live-ts" id="realTimestamp">-</span>
            </div>
        </header>

        <div class="unit-toggle-container">
            <button class="toggle-btn active" id="btnSeconds">Seconds (s)</button>
            <button class="toggle-btn" id="btnMilliseconds">Milliseconds (ms)</button>
        </div>

        <main class="convert-grid">
            
            <section class="convert-card">
                <h2 class="card-title">Date to Timestamp</h2>
                <div class="form-group">
                    <label for="datetimeInput">Local Date & Time</label>
                    <input type="datetime-local" id="datetimeInput" class="input-control">
                </div>
                <div class="btn-group">
                    <button class="btn btn-secondary" id="btnDateNow">Current Time</button>
                    <button class="btn btn-primary" id="btnToTimestamp">Convert</button>
                </div>
                <div class="form-group">
                    <label>Output Timestamp</label>
                    <div class="result-box" id="timestampResult" title="Click to copy"></div>
                </div>
            </section>

            <section class="convert-card">
                <h2 class="card-title">Timestamp to Date</h2>
                <div class="form-group">
                    <label for="timestampInput">Unix Timestamp</label>
                    <input type="number" id="timestampInput" class="input-control" placeholder="e.g. 1717752000">
                </div>
                <div class="btn-group">
                    <button class="btn btn-secondary" id="btnTsNow">Current TS</button>
                    <button class="btn btn-primary" id="btnToDate">Convert</button>
                </div>
                <div class="form-group">
                    <label>Output Local Date Time</label>
                    <div class="result-box" id="date
